<div class="min-h-screen flex items-center justify-center bg-slate-950 relative overflow-hidden">
  <div class="absolute top-[-10rem] left-[-10rem] w-[40rem] h-[40rem] bg-rose-600/15 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-[-10rem] right-[-10rem] w-[40rem] h-[40rem] bg-orange-600/15 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md px-4">
    <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-rose-500 to-orange-500 flex items-center justify-center shadow-lg shadow-rose-900/50 mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Admin Portal</h1>
        <p class="text-slate-400 text-sm mt-1">Sign in with admin credentials</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="label">Email address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="admin@example.com" class="input-dark" />
        </div>
        <div>
          <label class="label">Password</label>
          <input type="password" [(ngModel)]="pwd" name="pwd" placeholder="••••••••" class="input-dark" />
        </div>

        @if (error) {
          <div class="alert-error">{{ error }}</div>
        }

        <button type="submit" [disabled]="loading"
          class="w-full bg-gradient-to-r from-rose-600 to-orange-600 text-white font-semibold py-3 rounded-xl
                 hover:from-rose-500 hover:to-orange-500 transition-all duration-200 shadow-lg shadow-rose-900/40
                 disabled:opacity-50 disabled:cursor-not-allowed">
          {{ loading ? 'Signing in...' : 'Sign In as Admin' }}
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Customer login?
        <a routerLink="/login" class="text-indigo-400 font-medium hover:text-indigo-300 transition">Go here</a>
      </p>
    </div>
  </div>
</div>
