<div class="min-h-screen flex items-center justify-center bg-slate-950 relative overflow-hidden py-8">
  <!-- Background blobs -->
  <div class="absolute top-[-10rem] right-[-10rem] w-[40rem] h-[40rem] bg-violet-600/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-[-10rem] left-[-10rem] w-[40rem] h-[40rem] bg-indigo-600/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md px-4">
    <div class="glass-card rounded-3xl p-8 shadow-2xl">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-900/50 mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Create account</h1>
        <p class="text-slate-400 text-sm mt-1">Join PayWallet today</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="label">Full Name</label>
          <input type="text" [(ngModel)]="custName" name="custName" placeholder="John Doe" class="input-dark" />
        </div>
        <div>
          <label class="label">Mobile Number</label>
          <input type="text" [(ngModel)]="mobileNumber" name="mobileNumber" placeholder="10-digit number" class="input-dark" />
        </div>
        <div>
          <label class="label">Email address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" class="input-dark" />
        </div>
        <div>
          <label class="label">Password</label>
          <input type="password" [(ngModel)]="pwd" name="pwd" placeholder="••••••••" class="input-dark" />
        </div>

        @if (error) {
          <div class="alert-error">{{ error }}</div>
        }

        <button type="submit" [disabled]="loading" class="btn-primary w-full text-center mt-2">
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <p class="text-center text-sm text-slate-500 mt-6">
        Already have an account?
        <a routerLink="/login" class="text-indigo-400 font-medium hover:text-indigo-300 transition">Sign in</a>
      </p>
    </div>
  </div>
</div>
