<nav class="bg-indigo-600 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <a routerLink="/dashboard" class="text-xl font-bold tracking-wide">PayWallet</a>

    @if (isLoggedIn) {
      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a routerLink="/dashboard" routerLinkActive="underline" class="hover:text-indigo-200 transition">Dashboard</a>
        <a routerLink="/wallet" routerLinkActive="underline" class="hover:text-indigo-200 transition">Wallet</a>
        <a routerLink="/bank-account" routerLinkActive="underline" class="hover:text-indigo-200 transition">Bank</a>
        <a routerLink="/beneficiary" routerLinkActive="underline" class="hover:text-indigo-200 transition">Beneficiary</a>
        <a routerLink="/bill-payment" routerLinkActive="underline" class="hover:text-indigo-200 transition">Bills</a>
        <a routerLink="/transactions" routerLinkActive="underline" class="hover:text-indigo-200 transition">Transactions</a>
        <button (click)="logout()" class="bg-white text-indigo-600 px-4 py-1 rounded-full font-semibold hover:bg-indigo-50 transition">
          Logout
        </button>
      </div>

      <!-- Mobile menu button -->
      <button class="md:hidden" (click)="menuOpen = !menuOpen">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    }
  </div>

  @if (isLoggedIn && menuOpen) {
    <div class="md:hidden bg-indigo-700 px-4 pb-4 flex flex-col gap-3 text-sm font-medium">
      <a routerLink="/dashboard" (click)="menuOpen=false" class="hover:text-indigo-200">Dashboard</a>
      <a routerLink="/wallet" (click)="menuOpen=false" class="hover:text-indigo-200">Wallet</a>
      <a routerLink="/bank-account" (click)="menuOpen=false" class="hover:text-indigo-200">Bank</a>
      <a routerLink="/beneficiary" (click)="menuOpen=false" class="hover:text-indigo-200">Beneficiary</a>
      <a routerLink="/bill-payment" (click)="menuOpen=false" class="hover:text-indigo-200">Bills</a>
      <a routerLink="/transactions" (click)="menuOpen=false" class="hover:text-indigo-200">Transactions</a>
      <button (click)="logout()" class="text-left text-red-300 hover:text-red-100">Logout</button>
    </div>
  }
</nav>
